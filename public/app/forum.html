<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community — Rootstock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/rootstock.css">
  <style>
    body { background: var(--cream); min-height: 100vh; }

    /* ── Nav ──────────────────────────────────────────────────────── */
    .app-nav { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid var(--border); }
    .app-nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 var(--space-6); height: 56px; display: flex; align-items: center; gap: var(--space-6); }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
    .nav-logo-mark { width: 30px; height: 30px; background: var(--green-deep); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .nav-logo-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--green-deep); letter-spacing: -0.3px; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link { font-size: 14px; font-weight: 400; color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 7px; transition: color 0.12s, background 0.12s; white-space: nowrap; }
    .nav-link:hover { color: var(--green-deep); background: var(--green-pale); text-decoration: none; }
    .nav-link.active { color: var(--green-deep); font-weight: 500; background: var(--green-pale); }
    .nav-user { display: flex; align-items: center; gap: var(--space-3); margin-left: auto; flex-shrink: 0; }
    .nav-user-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
    .tier-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; }
    .tier-free { background: var(--cream); color: var(--bark-light); border: 1px solid var(--border); }
    .tier-pro  { background: var(--green-deep); color: var(--green-light); }
    .btn-signout { font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 5px 8px; border-radius: 6px; font-family: 'DM Sans', sans-serif; transition: color 0.12s, background 0.12s; }
    .btn-signout:hover { color: var(--text); background: var(--cream); }

    .skel { border-radius: 6px; background: linear-gradient(90deg, #ece9e1 25%, #f4f1e9 50%, #ece9e1 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Layout ──────────────────────────────────────────────────── */
    .main { max-width: 860px; margin: 0 auto; padding: 2.5rem var(--space-6) 5rem; }

    /* ── Page header ──────────────────────────────────────────────── */
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-4); margin-bottom: 1.5rem; flex-wrap: wrap; }
    .page-title-block { flex: 1; min-width: 200px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: clamp(22px, 3vw, 28px); font-weight: 500; color: var(--green-deep); margin-bottom: 3px; }
    .page-sub { font-size: 14px; color: var(--muted); }
    .btn-new-post { display: inline-flex; align-items: center; gap: 6px; background: var(--green-mid); color: var(--green-pale); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px 18px; border: none; border-radius: 9px; cursor: pointer; transition: background 0.12s; white-space: nowrap; flex-shrink: 0; }
    .btn-new-post:hover { background: var(--green-deep); }

    /* ── Tabs / filter ────────────────────────────────────────────── */
    .cat-tabs { display: flex; gap: var(--space-2); margin-bottom: 1.5rem; flex-wrap: wrap; }
    .cat-tab { font-size: 13px; font-weight: 400; color: var(--muted); background: white; border: 1px solid var(--border); border-radius: 100px; padding: 5px 14px; cursor: pointer; transition: all 0.12s; font-family: 'DM Sans', sans-serif; }
    .cat-tab:hover { color: var(--green-deep); border-color: var(--green-mid); }
    .cat-tab.active { background: var(--green-deep); color: var(--green-light); border-color: var(--green-deep); font-weight: 500; }

    /* ── Post list ────────────────────────────────────────────────── */
    .post-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
    .post-row { background: white; padding: var(--space-4) var(--space-5); cursor: pointer; transition: background 0.1s; display: flex; gap: var(--space-4); align-items: flex-start; }
    .post-row:hover { background: #fdfcf9; }
    .post-row:first-child { border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
    .post-row:last-child  { border-radius: 0 0 var(--radius-xl) var(--radius-xl); }
    .post-row:only-child  { border-radius: var(--radius-xl); }

    .post-vote { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; padding-top: 2px; }
    .btn-vote { width: 28px; height: 24px; border: 1px solid var(--border); background: white; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; transition: all 0.12s; }
    .btn-vote:hover { border-color: var(--green-mid); color: var(--green-mid); background: var(--green-pale); }
    .btn-vote.voted { background: var(--green-pale); border-color: var(--green-mid); color: var(--green-deep); }
    .vote-count { font-size: 13px; font-weight: 500; color: var(--text); }

    .post-main { flex: 1; min-width: 0; }
    .post-cat-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 4px; }
    .post-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
    .post-excerpt { font-size: 13.5px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: var(--space-2); }
    .post-meta { display: flex; align-items: center; gap: var(--space-3); font-size: 12px; color: var(--muted); flex-wrap: wrap; }
    .post-meta-author { font-weight: 500; color: var(--text); }
    .post-reply-count { display: flex; align-items: center; gap: 4px; }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 4rem 2rem; background: white; border: 1.5px dashed var(--border); border-radius: var(--radius-xl); }
    .empty-icon { font-size: 40px; margin-bottom: var(--space-3); }
    .empty-heading { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: var(--green-deep); margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: var(--muted); margin-bottom: var(--space-4); max-width: 320px; margin-left: auto; margin-right: auto; }

    /* ── Post detail view ─────────────────────────────────────────── */
    .post-detail { display: none; }
    .post-detail.visible { display: block; }
    .post-list-view.hidden { display: none; }

    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13.5px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 5px 8px; border-radius: 6px; font-family: 'DM Sans', sans-serif; margin-bottom: 1.25rem; transition: color 0.12s, background 0.12s; }
    .back-btn:hover { color: var(--green-deep); background: var(--green-pale); }

    .detail-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-5) var(--space-6); margin-bottom: 1.5rem; }
    .detail-cat-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green-mid); margin-bottom: var(--space-2); }
    .detail-title { font-family: 'Playfair Display', serif; font-size: clamp(18px, 2.5vw, 22px); font-weight: 500; color: var(--green-deep); margin-bottom: var(--space-3); line-height: 1.3; }
    .detail-meta { font-size: 13px; color: var(--muted); margin-bottom: var(--space-4); }
    .detail-meta strong { color: var(--text); }
    .detail-body { font-size: 15px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .detail-vote-row { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border); }
    .btn-vote-lg { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); background: white; border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
    .btn-vote-lg:hover { border-color: var(--green-mid); color: var(--green-mid); background: var(--green-pale); }
    .btn-vote-lg.voted { background: var(--green-pale); border-color: var(--green-mid); color: var(--green-deep); font-weight: 500; }

    /* Replies */
    .replies-section { }
    .replies-heading { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: var(--space-3); }
    .reply-list { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-4); }
    .reply-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); }
    .reply-meta { font-size: 12px; color: var(--muted); margin-bottom: var(--space-2); }
    .reply-meta strong { color: var(--text); }
    .reply-body { font-size: 14px; color: var(--text); line-height: 1.65; white-space: pre-wrap; }

    /* Reply form */
    .reply-form-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-4) var(--space-5); }
    .reply-form-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: var(--space-2); display: block; }
    .reply-textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--cream); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; outline: none; resize: vertical; min-height: 100px; transition: border-color 0.15s, box-shadow 0.15s; }
    .reply-textarea:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); background: white; }
    .reply-textarea::placeholder { color: var(--muted); opacity: 0.55; }
    .reply-form-footer { display: flex; justify-content: flex-end; margin-top: var(--space-3); }
    .btn-reply { display: inline-flex; align-items: center; gap: 6px; background: var(--green-mid); color: var(--green-pale); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px 20px; border: none; border-radius: 9px; cursor: pointer; transition: background 0.12s; }
    .btn-reply:hover:not(:disabled) { background: var(--green-deep); }
    .btn-reply:disabled { opacity: 0.55; cursor: not-allowed; }
    .spin { width: 14px; height: 14px; border: 2px solid rgba(192,221,151,0.4); border-top-color: var(--green-light); border-radius: 50%; animation: rotate 0.6s linear infinite; display: none; }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .btn-reply.loading .spin { display: block; }
    .btn-reply.loading .reply-label { display: none; }

    /* New post drawer */
    .overlay { position: fixed; inset: 0; background: rgba(26,26,20,0.45); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(2px); }
    .overlay.open { display: flex; }
    @media (min-width: 700px) { .overlay { align-items: center; justify-content: center; } }
    .drawer { background: white; width: 100%; max-width: 580px; border-radius: 20px 20px 0 0; padding: 1.75rem 1.5rem 2rem; box-shadow: 0 -8px 40px rgba(31,61,12,0.12); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); max-height: 92vh; overflow-y: auto; }
    @media (min-width: 700px) { .drawer { border-radius: 20px; transform: scale(0.96); opacity: 0; transition: transform 0.22s ease, opacity 0.22s ease; } }
    .overlay.open .drawer { transform: translateY(0); }
    @media (min-width: 700px) { .overlay.open .drawer { transform: scale(1); opacity: 1; } }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .drawer-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--green-deep); }
    .btn-close { width: 32px; height: 32px; border: none; background: var(--cream); cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .btn-close:hover { background: #ece9e1; color: var(--text); }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .field-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14.5px; color: var(--text); background: var(--cream); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .field-input:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); background: white; }
    .field-input::placeholder { color: var(--muted); opacity: 0.55; }
    select.field-input { appearance: none; cursor: pointer; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6b58' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 13px center; padding-right: 34px; }
    textarea.field-input { resize: vertical; min-height: 140px; font-size: 14px; line-height: 1.6; }
    .drawer-alert { padding: 9px 13px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; display: none; }
    .drawer-alert.show { display: block; }
    .drawer-alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .drawer-footer { display: flex; gap: var(--space-3); margin-top: 1.25rem; }
    .btn-primary { flex: 1; padding: 11px; background: var(--green-mid); color: var(--green-pale); border: none; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14.5px; font-weight: 500; cursor: pointer; transition: background 0.12s; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .btn-primary:hover:not(:disabled) { background: var(--green-deep); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary { padding: 11px 18px; background: white; color: var(--text); border: 1px solid var(--border); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14.5px; font-weight: 400; cursor: pointer; }
    .btn-secondary:hover { background: var(--cream); }
    .post-spin { width: 15px; height: 15px; border: 2px solid rgba(192,221,151,0.4); border-top-color: var(--green-light); border-radius: 50%; animation: rotate 0.6s linear infinite; display: none; }
    .btn-primary.loading .post-spin { display: block; }
    .btn-primary.loading .post-label { display: none; }

    @media (max-width: 640px) { .nav-links { display: none; } .page-header { flex-direction: column; align-items: flex-start; } .detail-card { padding: var(--space-4); } }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────────────── -->
<nav class="app-nav">
  <div class="app-nav-inner">
    <a href="/app/" class="nav-logo">
      <div class="nav-logo-mark">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <path d="M11 3C11 3 7 7 7 12C7 15 9 17 11 18C13 17 15 15 15 12C15 7 11 3 11 3Z" fill="#C0DD97"/>
          <path d="M11 18L11 21" stroke="#C0DD97" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M11 15C8 13 6 14 6 14" stroke="#C0DD97" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M11 17C13.5 15 15.5 16 15.5 16" stroke="#C0DD97" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-logo-name">Rootstock</span>
    </a>

    <div class="nav-links">
      <a href="/app/"              class="nav-link">Dashboard</a>
      <a href="/app/project.html"  class="nav-link">New Project</a>
      <a href="/app/inventory.html"    class="nav-link">Inventory</a>
      <a href="/app/journal.html"      class="nav-link">Journal</a>
      <a href="/app/forum.html"        class="nav-link active">Forum</a>
      <a href="/app/tool-reviews.html" class="nav-link">Reviews</a>
      <a href="/app/settings.html" class="nav-link">Settings</a>
    </div>

    <div class="nav-user" id="nav-user">
      <div class="skel" style="width:80px;height:16px;"></div>
    </div>
  </div>
</nav>

<!-- ── Main ─────────────────────────────────────────────────────────── -->
<main class="main" id="main" style="display:none;">

  <!-- ── Post list view ── -->
  <div id="list-view" class="post-list-view">
    <div class="page-header">
      <div class="page-title-block">
        <h1 class="page-title">Community</h1>
        <p class="page-sub">Ask questions and share what you know.</p>
      </div>
      <button class="btn-new-post" id="btn-new-post">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Post
      </button>
    </div>

    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="post-list-container"></div>
  </div>

  <!-- ── Post detail view ── -->
  <div id="detail-view" class="post-detail">
    <button class="back-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L3 7l6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to community
    </button>
    <div class="detail-card" id="detail-content"></div>
    <div class="replies-section" id="replies-section"></div>
  </div>

</main>

<!-- Loading skeleton -->
<div id="loading" style="max-width:860px;margin:2.5rem auto;padding:0 1.5rem;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <div class="skel" style="height:28px;width:180px;"></div>
    <div class="skel" style="height:38px;width:110px;border-radius:9px;"></div>
  </div>
  <div style="background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:14px;width:70%;"></div><div class="skel" style="height:12px;width:90%;"></div><div class="skel" style="height:12px;width:40%;"></div></div>
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:14px;width:55%;"></div><div class="skel" style="height:12px;width:80%;"></div><div class="skel" style="height:12px;width:35%;"></div></div>
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:12px;width:95%;"></div><div class="skel" style="height:12px;width:45%;"></div></div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:14px;width:50%;"></div><div class="skel" style="height:12px;width:75%;"></div><div class="skel" style="height:12px;width:30%;"></div></div>
  </div>
</div>

<!-- ── New post drawer ────────────────────────────────────────────── -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="drawer">
    <div class="drawer-header">
      <h2 class="drawer-title">New Post</h2>
      <button class="btn-close" id="btn-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="drawer-alert" id="post-alert"></div>
    <form id="post-form" novalidate>
      <div class="form-row">
        <label for="f-post-title">Title</label>
        <input type="text" id="f-post-title" class="field-input" placeholder="Ask a question or share a tip…" required>
      </div>
      <div class="form-row">
        <label for="f-post-cat">Category</label>
        <select id="f-post-cat" class="field-input">
          <option value="general">General Discussion</option>
          <option value="landscape">Landscape & Gardening</option>
          <option value="cooking">Cooking & Baking</option>
          <option value="canning">Canning & Preservation</option>
          <option value="auto">Auto & Small Engine</option>
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="solar">Solar & Off-Grid</option>
          <option value="animals">Animals & Livestock</option>
          <option value="building">Building & Renovation</option>
          <option value="self-sufficiency">Other Self-Sufficiency</option>
        </select>
      </div>
      <div class="form-row">
        <label for="f-post-body">Details <span style="font-weight:400;color:var(--muted);">(optional)</span></label>
        <textarea id="f-post-body" class="field-input" placeholder="Include any relevant context, what you've tried, your location or setup…"></textarea>
      </div>
      <div class="drawer-footer">
        <button type="button" class="btn-secondary" id="btn-post-cancel">Cancel</button>
        <button type="submit" class="btn-primary" id="btn-post-submit">
          <span class="post-label">Post</span>
          <span class="post-spin"></span>
        </button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { requireAuth, getProfile, signOut, supabase } from '/js/auth.js'

// ── Init ──────────────────────────────────────────────────────────
const session = await requireAuth()
if (!session) throw new Error('Not authenticated')
const userId = session.user.id

const profile = await getProfile()
renderNav(profile, session.user.email)

await loadPosts()
renderCatTabs()
renderPostList()

document.getElementById('loading').style.display = 'none'
document.getElementById('main').style.display = 'block'

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

const CAT_LABELS = {
  general: 'General Discussion', landscape: 'Landscape & Gardening', cooking: 'Cooking & Baking',
  canning: 'Canning & Preservation', auto: 'Auto & Small Engine', plumbing: 'Plumbing',
  electrical: 'Electrical', solar: 'Solar & Off-Grid', animals: 'Animals & Livestock',
  building: 'Building & Renovation', 'self-sufficiency': 'Other Self-Sufficiency',
}

// ── State ─────────────────────────────────────────────────────────
let allPosts     = []
let filterCat    = ''
let currentPost  = null
let currentReplies = []

// ── Nav ───────────────────────────────────────────────────────────
function renderNav(profile, email) {
  const name = esc(profile?.display_name || email?.split('@')[0] || 'Account')
  const isPro = profile?.subscription_tier === 'pro'
  const tier = isPro ? '<span class="tier-badge tier-pro">Pro</span>' : '<span class="tier-badge tier-free">Free</span>'
  document.getElementById('nav-user').innerHTML = `
    <span class="nav-user-name">${name}</span>
    ${tier}
    <button class="btn-signout" id="btn-signout">Sign out</button>
  `
  document.getElementById('btn-signout').addEventListener('click', () => signOut())
}

// ── Load posts ────────────────────────────────────────────────────
async function loadPosts() {
  const db = await supabase()
  const { data } = await db
    .from('forum_posts')
    .select('*, profiles:author_id(display_name), forum_replies(count)')
    .order('created_at', { ascending: false })
    .limit(100)
  allPosts = data || []
}

// ── Category tabs ─────────────────────────────────────────────────
function renderCatTabs() {
  const container = document.getElementById('cat-tabs')
  const cats = ['', ...Object.keys(CAT_LABELS)]
  container.innerHTML = cats.map(c =>
    `<button class="cat-tab${filterCat === c ? ' active' : ''}" data-cat="${c}">${c === '' ? 'All' : CAT_LABELS[c]}</button>`
  ).join('')
  container.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      filterCat = tab.dataset.cat
      renderCatTabs()
      renderPostList()
    })
  })
}

// ── Post list ─────────────────────────────────────────────────────
function renderPostList() {
  const container = document.getElementById('post-list-container')
  const posts = filterCat ? allPosts.filter(p => p.category === filterCat) : allPosts

  if (posts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-heading">${filterCat ? 'No posts in this category' : 'No posts yet'}</div>
        <p class="empty-sub">${filterCat ? 'Be the first to post here.' : 'Start the conversation — ask a question or share something useful.'}</p>
        <button class="btn-new-post" id="empty-new-post">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New Post
        </button>
      </div>
    `
    document.getElementById('empty-new-post')?.addEventListener('click', openNewPost)
    return
  }

  container.innerHTML = `
    <div class="post-list">
      ${posts.map(post => {
        const authorName = post.profiles?.display_name || 'Community member'
        const replyCount = post.forum_replies?.[0]?.count || 0
        const dateStr    = new Date(post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        const catLabel   = CAT_LABELS[post.category] || post.category || 'General'
        return `
          <div class="post-row" data-post-id="${esc(post.id)}">
            <div class="post-vote">
              <button class="btn-vote${post._voted ? ' voted' : ''}" data-upvote="${esc(post.id)}" title="Upvote">▲</button>
              <span class="vote-count">${post.upvotes || 0}</span>
            </div>
            <div class="post-main">
              <div class="post-cat-tag">${esc(catLabel)}</div>
              <div class="post-title">${esc(post.title)}</div>
              ${post.body ? `<p class="post-excerpt">${esc(post.body)}</p>` : ''}
              <div class="post-meta">
                <span class="post-meta-author">${esc(authorName)}</span>
                <span>${dateStr}</span>
                <span class="post-reply-count">
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 2h10a1 1 0 011 1v5a1 1 0 01-1 1H4L1 11V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
                  ${replyCount} ${replyCount === 1 ? 'reply' : 'replies'}
                </span>
              </div>
            </div>
          </div>
        `
      }).join('')}
    </div>
  `

  container.querySelectorAll('.post-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('[data-upvote]')) return
      openPost(row.dataset.postId)
    })
  })
  container.querySelectorAll('[data-upvote]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation()
      upvotePost(btn.dataset.upvote, btn)
    })
  })
}

// ── Upvote (optimistic) ───────────────────────────────────────────
async function upvotePost(postId, btn) {
  const post = allPosts.find(p => p.id === postId)
  if (!post) return
  post._voted = !post._voted
  post.upvotes = (post.upvotes || 0) + (post._voted ? 1 : -1)
  renderPostList()
  const db = await supabase()
  await db.from('forum_posts').update({ upvotes: post.upvotes }).eq('id', postId)
}

// ── Open post detail ──────────────────────────────────────────────
async function openPost(postId) {
  currentPost = allPosts.find(p => p.id === postId)
  if (!currentPost) return

  document.getElementById('list-view').classList.add('hidden')
  document.getElementById('detail-view').classList.add('visible')

  const authorName = currentPost.profiles?.display_name || 'Community member'
  const dateStr    = new Date(currentPost.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
  const catLabel   = CAT_LABELS[currentPost.category] || 'General'

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-cat-tag">${esc(catLabel)}</div>
    <h2 class="detail-title">${esc(currentPost.title)}</h2>
    <div class="detail-meta">By <strong>${esc(authorName)}</strong> · ${dateStr}</div>
    ${currentPost.body ? `<div class="detail-body">${esc(currentPost.body)}</div>` : ''}
    <div class="detail-vote-row">
      <button class="btn-vote-lg${currentPost._voted ? ' voted' : ''}" id="detail-upvote">
        ▲ ${currentPost.upvotes || 0} upvote${(currentPost.upvotes || 0) === 1 ? '' : 's'}
      </button>
    </div>
  `
  document.getElementById('detail-upvote').addEventListener('click', async () => {
    await upvotePost(currentPost.id)
    const post = allPosts.find(p => p.id === currentPost.id)
    const btn  = document.getElementById('detail-upvote')
    if (btn && post) {
      btn.className = `btn-vote-lg${post._voted ? ' voted' : ''}`
      btn.textContent = `▲ ${post.upvotes || 0} upvote${(post.upvotes || 0) === 1 ? '' : 's'}`
    }
  })

  await loadReplies(postId)
  renderReplies()
  window.scrollTo(0, 0)
}

async function loadReplies(postId) {
  const db = await supabase()
  const { data } = await db
    .from('forum_replies')
    .select('*, profiles:author_id(display_name)')
    .eq('post_id', postId)
    .order('created_at', { ascending: true })
  currentReplies = data || []
}

function renderReplies() {
  const section = document.getElementById('replies-section')
  const count = currentReplies.length
  section.innerHTML = `
    <div class="replies-heading">${count === 0 ? 'No replies yet' : `${count} ${count === 1 ? 'reply' : 'replies'}`}</div>
    <div class="reply-list">
      ${currentReplies.map(r => {
        const name = r.profiles?.display_name || 'Community member'
        const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        return `
          <div class="reply-card">
            <div class="reply-meta"><strong>${esc(name)}</strong> · ${date}</div>
            <div class="reply-body">${esc(r.body)}</div>
          </div>
        `
      }).join('')}
    </div>
    <div class="reply-form-card">
      <label class="reply-form-label" for="reply-body">Add a reply</label>
      <textarea id="reply-body" class="reply-textarea" placeholder="Share your experience or answer the question…"></textarea>
      <div class="reply-form-footer">
        <button class="btn-reply" id="btn-submit-reply">
          <span class="reply-label">Post reply</span>
          <span class="spin"></span>
        </button>
      </div>
    </div>
  `
  document.getElementById('btn-submit-reply').addEventListener('click', submitReply)
}

async function submitReply() {
  const body = document.getElementById('reply-body').value.trim()
  if (!body) return
  const btn = document.getElementById('btn-submit-reply')
  btn.classList.add('loading')
  btn.disabled = true
  try {
    const db = await supabase()
    const { data, error } = await db.from('forum_replies').insert({
      post_id:   currentPost.id,
      author_id: userId,
      body,
    }).select('*, profiles:author_id(display_name)').single()
    if (error) throw error
    currentReplies = [...currentReplies, data]
    // Update reply count in list
    const post = allPosts.find(p => p.id === currentPost.id)
    if (post?.forum_replies?.[0]) post.forum_replies[0].count = (post.forum_replies[0].count || 0) + 1
    renderReplies()
  } catch (err) {
    alert(err.message || 'Failed to post reply.')
  } finally {
    btn.classList.remove('loading')
    btn.disabled = false
  }
}

// ── Back to list ──────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('detail-view').classList.remove('visible')
  document.getElementById('list-view').classList.remove('hidden')
  currentPost    = null
  currentReplies = []
  renderPostList()
})

// ── New post drawer ───────────────────────────────────────────────
function openNewPost() {
  document.getElementById('post-form').reset()
  document.getElementById('post-alert').className = 'drawer-alert'
  document.getElementById('overlay').classList.add('open')
  document.body.style.overflow = 'hidden'
  setTimeout(() => document.getElementById('f-post-title').focus(), 100)
}
function closeNewPost() {
  document.getElementById('overlay').classList.remove('open')
  document.body.style.overflow = ''
}

document.getElementById('btn-new-post').addEventListener('click', openNewPost)
document.getElementById('btn-close').addEventListener('click', closeNewPost)
document.getElementById('btn-post-cancel').addEventListener('click', closeNewPost)
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeNewPost() })

document.getElementById('post-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const title = document.getElementById('f-post-title').value.trim()
  if (!title) {
    const al = document.getElementById('post-alert')
    al.textContent = 'Please enter a title.'
    al.className = 'drawer-alert show error'
    return
  }
  const btn = document.getElementById('btn-post-submit')
  btn.classList.add('loading')
  btn.disabled = true
  try {
    const db = await supabase()
    const { data, error } = await db.from('forum_posts').insert({
      author_id: userId,
      title,
      body:     document.getElementById('f-post-body').value.trim() || null,
      category: document.getElementById('f-post-cat').value,
      upvotes:  0,
    }).select('*, profiles:author_id(display_name), forum_replies(count)').single()
    if (error) throw error
    allPosts = [data, ...allPosts]
    closeNewPost()
    renderPostList()
  } catch (err) {
    const al = document.getElementById('post-alert')
    al.textContent = err.message || 'Failed to post.'
    al.className = 'drawer-alert show error'
  } finally {
    btn.classList.remove('loading')
    btn.disabled = false
  }
})
</script>
</body>
